<div class="container">
  <h2>Cadastro de Cliente</h2>

  <form>
    <div class="form-group">
      <label>Nome</label>
      <input type="text" [(ngModel)]="cliente.nome" name="nome" />
    </div>

    <div class="form-group">
      <label>Documento</label>
      <input type="text" [(ngModel)]="cliente.documento" name="documento" (input)="formatarDocumento()"/>
    </div>

    <div class="form-group">
      <label>Tipo</label>
      <select [(ngModel)]="cliente.tipoPessoa" name="tipoPessoa" disabled>
        <option value="PF">Pessoa Física</option>
        <option value="PJ">Pessoa Jurídica</option>
      </select>
    </div>

    <button class="btn" (click)="salvar()">Salvar</button>
  </form>   

</div>
